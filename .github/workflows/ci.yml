name: CI

on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main, stable]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Verify provider artifacts
        run: |
          test -f packages/provider/kimicoding/dist/src/index.js
          test -f packages/provider/kimicoding/dist/src/index.d.ts
          test -f packages/provider/kie/dist/src/index.js
          test -f packages/provider/kie/dist/src/index.d.ts
          test -f packages/provider/alibaba/dist/src/index.js
          test -f packages/provider/alibaba/dist/src/index.d.ts

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Integration tests (replay)
        run: pnpm run test:run

  harness-report:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure harness-generated dir
        run: mkdir -p tests/fixtures/harness-generated

      - name: Generate harness report
        run: npx tsx tests/harness-report.ts > tests/fixtures/harness-generated/harness-report.html
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}

      - name: Screenshot harness viewer (full)
        uses: ./.github/actions/screenshot-harness
        with:
          html-source: tests/fixtures/harness-generated/harness-report.html
          output: tests/fixtures/harness-generated/harness-report.png

      - name: Generate media-only harness report
        run: npx tsx tests/harness-report.ts --media-only > tests/fixtures/harness-generated/harness-report-media.html
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}

      - name: Screenshot harness viewer (media)
        uses: ./.github/actions/screenshot-harness
        with:
          html-source: tests/fixtures/harness-generated/harness-report-media.html
          output: tests/fixtures/harness-generated/harness-report-media.png

      - name: Generate harness summary
        id: summary
        run: npx tsx tests/harness-summary.ts
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}

      - name: Commit harness assets
        if: steps.summary.outputs.has_assets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout ${{ github.head_ref }}
          git add -f tests/fixtures/harness-generated/
          git commit -m "ci: add harness media assets [skip ci]" || true
          git push

      - name: Post harness summary to PR
        if: steps.summary.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file harness-summary.md \
            --edit-last 2>/dev/null || \
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file harness-summary.md

      - name: Upload harness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harness-report
          path: |
            tests/fixtures/harness-generated/harness-report.html
            tests/fixtures/harness-generated/harness-report.png
            tests/fixtures/harness-generated/harness-report-media.html
            tests/fixtures/harness-generated/harness-report-media.png
          retention-days: 30
