formula = "add-endpoint"
description = "Add a single API endpoint to a NakedAPI provider package"
type = "workflow"

[[steps]]
description = "Add TypeScript interfaces for the request and response shapes. Follow naming conventions: PascalCase for types, include all fields from upstream docs."
id = "types"
labels = ["code"]
title = "Add request/response types for {{provider}} {{endpoint}}"

[[steps]]
depends_on = ["types"]
description = "Add a payloadSchema object and validatePayload function. Schema should match the request type definition."
id = "schema"
labels = ["code"]
title = "Add payload schema for {{provider}} {{endpoint}}"

[[steps]]
depends_on = ["types", "schema"]
description = "Add the endpoint method to the factory function in packages/provider/{{provider}}/src/{{provider}}.ts. Use Object.assign for callable namespaces. Export new types from index.ts."
id = "factory"
labels = ["code"]
title = "Wire {{endpoint}} into {{provider}} factory"

[[steps]]
depends_on = ["factory"]
description = "Add test cases to tests/unit/providers/{{provider}}.test.ts covering success path, error handling, and payload validation."
id = "unit-test"
labels = ["test"]
title = "Add unit tests for {{provider}} {{endpoint}}"

[[steps]]
depends_on = ["factory"]
description = "Write tests/integration/{{provider}}-<endpoint-slug>.test.ts using setupPolly/teardownPolly. Record fixtures with POLLY_MODE=record, verify replay passes."
id = "integration-test"
labels = ["test"]
title = "Add integration test for {{provider}} {{endpoint}}"

[[steps]]
depends_on = ["unit-test", "integration-test"]
description = "User reviews recordings locally (pnpm run harness). User commits recordings. Push and open PR. CI posts harness summary comment."
id = "review-and-pr"
labels = ["review"]
title = "Review recordings and open PR for {{provider}} {{endpoint}}"

[variables.provider]
description = "Provider package name (openai, xai, fal, kimicoding, kie)"
required = true

[variables.endpoint]
description = "Endpoint path (e.g., v1.embeddings, v1.audio.speech)"
required = true
