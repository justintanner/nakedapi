name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Verify provider artifacts
        run: |
          test -f packages/provider/kimicoding/dist/src/index.js
          test -f packages/provider/kimicoding/dist/src/index.d.ts
          test -f packages/provider/kie/dist/src/index.js
          test -f packages/provider/kie/dist/src/index.d.ts

      - name: Lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test:run
