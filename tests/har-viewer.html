<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NakedAPI HAR Viewer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      ::-webkit-scrollbar {
        width: 12px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
        margin: 4px 0;
      }
      ::-webkit-scrollbar-thumb {
        background: #45475a;
        border-radius: 6px;
        border: 3px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #585b70;
      }
      ::-webkit-scrollbar-corner {
        background: #11111b;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        background: #1e1e2e;
        color: #cdd6f4;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Topbar */
      #topbar {
        display: flex;
        align-items: center;
        padding: 8px 16px;
        background: #181825;
        border-bottom: 1px solid #313244;
        gap: 8px;
        flex-shrink: 0;
        z-index: 100;
        position: sticky;
        top: 0;
      }
      #topbar-left {
        display: flex;
        align-items: baseline;
        gap: 12px;
        flex: 1;
      }
      #topbar-right {
        flex-shrink: 0;
      }
      #branding {
        font-size: 16px;
        font-weight: 700;
        color: #89b4fa;
        letter-spacing: 0.5px;
      }
      #rec-count {
        font-size: 12px;
        color: #6c7086;
      }
      .recording-section-header .review-badge,
      .recording-section-header .info-model {
        margin-left: 0;
      }
      .recording-section-header .endpoint {
        color: #6c7086;
        font-size: 11px;
        margin-left: auto;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 50%;
      }
      .section-actions {
        display: flex;
        gap: 6px;
        margin-left: 8px;
      }
      .section-actions button {
        padding: 4px 10px;
        border: none;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
      }
      .section-actions .approve {
        background: #a6e3a1;
        color: #1e1e2e;
      }
      .section-actions .approve:hover {
        background: #94e2d5;
      }
      .section-actions .approve:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .section-actions .copy-llm {
        background: #89b4fa;
        color: #1e1e2e;
      }
      .section-actions .copy-llm:hover {
        background: #74c7ec;
      }

      /* Recording sections (single-page vertical layout) */
      #sections {
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding: 24px;
        max-width: 100%;
      }
      .recording-section {
        background: #181825;
        border: 1px solid #313244;
        border-radius: 12px;
        overflow: hidden;
      }
      .recording-section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        background: #11111b;
        border-bottom: 1px solid #313244;
        position: sticky;
        top: 49px;
        z-index: 50;
      }
      .recording-title {
        font-weight: 700;
        font-size: 14px;
        color: #cdd6f4;
      }
      .recording-section-body {
        padding: 16px;
      }
      .txn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }
      .txn-col {
        flex: 1 1 540px;
        min-width: 0;
        background: #1e1e2e;
        border-radius: 8px;
        padding: 12px;
      }

      /* Dots */
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        display: inline-block;
      }
      .dot.clean {
        background: #a6e3a1;
      }
      .dot.modified {
        background: #f9e2af;
      }
      .dot.new {
        background: #f38ba8;
      }

      /* Review badges */
      .review-badge {
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
        font-weight: 600;
        margin-left: auto;
        flex-shrink: 0;
      }
      .review-badge.needs-review {
        background: #f38ba8;
        color: #1e1e2e;
      }
      .review-badge.approved {
        background: #a6e3a1;
        color: #1e1e2e;
      }

      /* Entry cards */
      .entry-card {
        background: #181825;
        border: 1px solid #313244;
        border-radius: 8px;
        margin-bottom: 12px;
        overflow: hidden;
      }
      .entry-header {
        padding: 8px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid #313244;
        background: #11111b;
        font-size: 13px;
      }
      .entry-label {
        color: #cdd6f4;
        font-weight: 600;
      }
      .entry-status {
        margin-left: auto;
        color: #a6adc8;
        font-size: 12px;
      }
      .headers-details {
        margin: 0;
      }
      .headers-details summary {
        padding: 8px 12px;
        cursor: pointer;
        color: #6c7086;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .headers-details summary:hover {
        color: #a6adc8;
      }

      /* Pane labels */
      .pane-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #a6adc8;
        margin-bottom: 8px;
      }

      /* Body wrap and copy */
      .body-wrap {
        position: relative;
        margin: 0;
      }
      .body-wrap .copy-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        background: #313244;
        border: none;
        border-radius: 4px;
        color: #a6adc8;
        cursor: pointer;
        padding: 5px 6px;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
      }
      .body-wrap .copy-btn:hover {
        background: #45475a;
        color: #cdd6f4;
      }
      pre.body {
        background: #11111b;
        border-radius: 0;
        padding: 12px 16px;
        margin: 0;
        overflow: auto;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-all;
      }

      /* JSON highlighting */
      .json-key {
        color: #89b4fa;
      }
      .json-str {
        color: #a6e3a1;
      }
      .json-num {
        color: #fab387;
      }
      .json-bool {
        color: #cba6f7;
      }
      .json-null {
        color: #6c7086;
      }

      .hidden {
        display: none !important;
      }

      /* Media previews */
      .b64-img-preview {
        max-width: 320px;
        max-height: 240px;
        border-radius: 6px;
        border: 1px solid #313244;
        display: block;
        margin: 4px 0;
      }
      .video-preview {
        max-width: 480px;
        max-height: 320px;
        border-radius: 6px;
        border: 1px solid #313244;
        display: block;
        margin: 4px 0;
      }
      .audio-preview {
        max-width: 320px;
        border-radius: 6px;
        display: block;
        margin: 4px 0;
      }
      .b64-truncated {
        color: #6c7086;
        font-style: italic;
      }

      /* Info model badge */
      .info-model {
        display: inline-block;
        background: #cba6f7;
        color: #1e1e2e;
        padding: 1px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }

      /* Poll entry within poll history */
      .poll-entry {
        border-top: 1px solid #313244;
        padding: 8px 12px;
      }

      /* Empty state */
      .empty {
        padding: 40px;
        text-align: center;
        color: #6c7086;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header id="topbar">
      <div id="topbar-left">
        <span id="branding">NakedAPI HAR Viewer</span>
        <span id="rec-count"></span>
      </div>
      <div id="topbar-right"></div>
    </header>
    <main id="sections"></main>
    <script>
      /* === Config === */
      var VIEWER_CONFIG = {
        features: { gitApprove: false },
      };

      /* === State === */
      var recordings = [];
      var renderGeneration = 0;

      /* === HAR Parsing Utilities === */
      function displayName(recName) {
        var parts = recName.split("/");
        var provider = parts[0].replace(/_\d+$/, "");
        var test = parts.length > 1 ? parts[1].replace(/_\d+$/, "") : parts[0];
        return { provider: provider, test: test };
      }

      function recEndpoint(rec) {
        var entry = rec.entries && rec.entries[0];
        if (!entry) return "";
        try {
          var u = new URL(entry.request.url);
          return entry.request.method + " " + u.host + u.pathname;
        } catch (e) {
          return entry.request.method + " " + entry.request.url;
        }
      }

      function entryLabel(entry) {
        try {
          var u = new URL(entry.request.url);
          var segments = u.pathname.split("/").filter(Boolean);
          var last = segments[segments.length - 1] || u.pathname;
          return entry.request.method + " /" + last;
        } catch (e) {
          return entry.request.method;
        }
      }

      function groupTransactions(entries) {
        var groups = [];
        for (var i = 0; i < entries.length; i++) {
          var entry = entries[i];
          var key;
          try {
            var u = new URL(entry.request.url);
            key = entry.request.method + " " + u.pathname;
          } catch (e) {
            key = entry.request.method + " " + entry.request.url;
          }
          if (groups.length > 0 && groups[groups.length - 1].key === key) {
            groups[groups.length - 1].entries.push(entry);
          } else {
            groups.push({ key: key, entries: [entry] });
          }
        }
        return groups;
      }

      /* === Rendering Utilities === */
      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function inferMimeType(b64) {
        if (b64.startsWith("/9j/")) return "image/jpeg";
        if (b64.startsWith("iVBOR")) return "image/png";
        if (b64.startsWith("R0lGOD")) return "image/gif";
        if (b64.startsWith("UklGR")) return "image/webp";
        return null;
      }

      function syntaxHighlight(json) {
        if (typeof json !== "string") json = JSON.stringify(json, null, 2);
        return json
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(
            /"((?:\\.|[^"\\])+)"(\s*:)/g,
            '<span class="json-key">"$1"</span>$2'
          )
          .replace(
            /: "((?:\\.|[^"\\])*)"/g,
            ': <span class="json-str">"$1"</span>'
          )
          // Wrap array-element strings in raw JSON: `"..."` preceded by `[`
          // or `,` (with optional whitespace) and NOT followed by `:` (which
          // would make it an object key, not an element). Must run on raw
          // JSON before keys/values are wrapped in spans, to avoid matching
          // HTML attribute quotes.
          .replace(
            /([\[,])(\s*)"((?:\\.|[^"\\])*)"(?!\s*:)/g,
            '$1$2<span class="json-str">"$3"</span>'
          )
          .replace(/: (\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
          .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
          .replace(/: (null)/g, ': <span class="json-null">$1</span>');
      }

      function inlineMediaPreviews(html) {
        html = html.replace(
          /(<span class="json-key">"b64_json"<\/span>:\s*<span class="json-str">")(([A-Za-z0-9+\/=]{40})([A-Za-z0-9+\/=]*))"<\/span>/g,
          function (match, prefix, fullB64, first40) {
            var mime = inferMimeType(fullB64) || "image/jpeg";
            return (
              prefix +
              first40 +
              '...<span class="b64-truncated">[' +
              fullB64.length +
              ' chars]</span>"</span>' +
              '<img class="b64-img-preview" src="data:' +
              mime +
              ";base64," +
              fullB64 +
              '">'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"data"<\/span>:\s*<span class="json-str">")(([A-Za-z0-9+\/=]{100,}))"<\/span>/g,
          function (match, prefix, fullB64) {
            var mime = inferMimeType(fullB64);
            if (!mime) return match;
            return (
              prefix +
              fullB64.substring(0, 40) +
              '...<span class="b64-truncated">[' +
              fullB64.length +
              ' chars]</span>"</span>' +
              '<img class="b64-img-preview" src="data:' +
              mime +
              ";base64," +
              fullB64 +
              '">'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"url"<\/span>:\s*<span class="json-str">")(data:image\/[a-z+]+;base64,([A-Za-z0-9+\/=]{40})([A-Za-z0-9+\/=]*))"<\/span>/g,
          function (match, prefix, fullUri) {
            return (
              prefix +
              fullUri.substring(0, 40) +
              '...<span class="b64-truncated">[' +
              fullUri.length +
              ' chars]</span>"</span>' +
              '<img class="b64-img-preview" src="' +
              fullUri +
              '">'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"url"<\/span>:\s*<span class="json-str">")(https?:\/\/[^"]*\.(?:jpe?g|png|gif|webp|svg)(?:[^"]*)?)"<\/span>/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><img class="b64-img-preview" src="' +
              fullUrl +
              '">'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"url"<\/span>:\s*<span class="json-str">")(https?:\/\/[^"]*\.(?:mp4|webm|mov|ogg)(?:[^"]*)?)"<\/span>/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><video class="video-preview" controls src="' +
              fullUrl +
              '"></video>'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"video_url"<\/span>:\s*<span class="json-str">")(https?:\/\/[^"]*)"<\/span>/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><video class="video-preview" controls src="' +
              fullUrl +
              '"></video>'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"url"<\/span>:\s*<span class="json-str">")(https?:\/\/[^"]*\.(?:mp3|wav|flac|aac)(?:[^"]*)?)"<\/span>/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><audio class="audio-preview" controls src="' +
              fullUrl +
              '"></audio>'
            );
          }
        );
        html = html.replace(
          /(<span class="json-str">")(https?:\/\/[^"]*\.(?:jpe?g|png|gif|webp|svg)(?:\?[^"]*)?)"<\/span>(?!<img)/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><img class="b64-img-preview" src="' +
              fullUrl +
              '">'
            );
          }
        );
        html = html.replace(
          /(<span class="json-str">")(https?:\/\/[^"]*\.(?:mp4|webm|mov)(?:\?[^"]*)?)"<\/span>(?!<video)/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><video class="video-preview" controls src="' +
              fullUrl +
              '"></video>'
            );
          }
        );
        html = html.replace(
          /(<span class="json-str">")(https?:\/\/[^"]*\.(?:mp3|wav|flac|aac)(?:\?[^"]*)?)"<\/span>(?!<audio)/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><audio class="audio-preview" controls src="' +
              fullUrl +
              '"></audio>'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"url"<\/span>:\s*<span class="json-str">")(https?:\/\/[^"]+)"<\/span>(?!<img|<video|<audio)/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><img class="b64-img-preview" src="' +
              fullUrl +
              '" onerror="this.style.display=&apos;none&apos;">'
            );
          }
        );
        // KIE resultJson: nested JSON string containing output URLs
        html = html.replace(
          /(<span class="json-key">"resultJson"<\/span>:\s*<span class="json-str">")((?:\\.|[^"])*)"<\/span>/g,
          function (match, prefix, escapedJson) {
            try {
              var jsonStr = JSON.parse('"' + escapedJson + '"');
              var parsed = JSON.parse(jsonStr);
              var urls = [];
              if (Array.isArray(parsed.resultUrls)) {
                urls = parsed.resultUrls;
              } else if (Array.isArray(parsed.works)) {
                for (var w = 0; w < parsed.works.length; w++) {
                  if (parsed.works[w].resource)
                    urls.push(parsed.works[w].resource);
                  if (parsed.works[w].cover) urls.push(parsed.works[w].cover);
                }
              }
              var previews = "";
              for (var u = 0; u < urls.length; u++) {
                var url = urls[u];
                if (/\.mp4|\.webm|\.mov|video/i.test(url)) {
                  previews +=
                    '<video class="video-preview" controls src="' +
                    url +
                    '"></video>';
                } else if (/\.mp3|\.wav|\.flac|\.aac|audio/i.test(url)) {
                  previews +=
                    '<audio class="audio-preview" controls src="' +
                    url +
                    '"></audio>';
                } else {
                  previews +=
                    '<img class="b64-img-preview" src="' +
                    url +
                    '" onerror="this.style.display=&apos;none&apos;">';
                }
              }
              return prefix + escapedJson + '"</span>' + previews;
            } catch (e) {
              return match;
            }
          }
        );
        // KIE param: nested JSON string containing input media URLs
        html = html.replace(
          /(<span class="json-key">"param"<\/span>:\s*<span class="json-str">")((?:\\.|[^"])*)"<\/span>/g,
          function (match, prefix, escapedJson) {
            try {
              var jsonStr = JSON.parse('"' + escapedJson + '"');
              var parsed = JSON.parse(jsonStr);
              var input =
                typeof parsed.input === "string"
                  ? JSON.parse(parsed.input)
                  : parsed.input;
              if (!input) return match;
              var urls = [];
              var mediaKeys = [
                "video_url",
                "first_frame_url",
                "last_frame_url",
                "first_clip_url",
                "driving_audio_url",
                "image_url",
              ];
              for (var k = 0; k < mediaKeys.length; k++) {
                if (input[mediaKeys[k]]) urls.push(input[mediaKeys[k]]);
              }
              if (Array.isArray(input.reference_image)) {
                for (var ri = 0; ri < input.reference_image.length; ri++)
                  urls.push(input.reference_image[ri]);
              }
              if (Array.isArray(input.reference_video)) {
                for (var rv = 0; rv < input.reference_video.length; rv++)
                  urls.push(input.reference_video[rv]);
              }
              if (!urls.length) return match;
              var previews = "";
              for (var u = 0; u < urls.length; u++) {
                var url = urls[u];
                if (/\.mp4|\.webm|\.mov|video/i.test(url)) {
                  previews +=
                    '<video class="video-preview" controls src="' +
                    url +
                    '"></video>';
                } else if (/\.mp3|\.wav|\.flac|\.aac|audio/i.test(url)) {
                  previews +=
                    '<audio class="audio-preview" controls src="' +
                    url +
                    '"></audio>';
                } else {
                  previews +=
                    '<img class="b64-img-preview" src="' +
                    url +
                    '" onerror="this.style.display=&apos;none&apos;">';
                }
              }
              return prefix + escapedJson + '"</span>' + previews;
            } catch (e) {
              return match;
            }
          }
        );
        // Generic key-agnostic truncation: any `data:image/...;base64,<long>` span
        // anywhere in the JSON (array elements, nested objects, any key name).
        // The negative lookahead prevents double-matching spans the per-key
        // passes above already handled.
        html = html.replace(
          /<span class="json-str">"(data:(image|video|audio)\/[a-z+0-9.-]+;base64,)([A-Za-z0-9+\/=]{40,})"<\/span>(?!<img|<video|<audio)/g,
          function (match, prefix, mediaType, b64) {
            var preview =
              mediaType === "video"
                ? '<video class="video-preview" controls src="' +
                  prefix +
                  b64 +
                  '"></video>'
                : mediaType === "audio"
                  ? '<audio class="audio-preview" controls src="' +
                    prefix +
                    b64 +
                    '"></audio>'
                  : '<img class="b64-img-preview" src="' +
                    prefix +
                    b64 +
                    '">';
            return (
              '<span class="json-str">"' +
              prefix +
              b64.substring(0, 40) +
              '...<span class="b64-truncated">[' +
              b64.length +
              ' chars]</span>"</span>' +
              preview
            );
          }
        );
        // Generic key-agnostic truncation: any bare base64 blob of 200+ chars
        // that starts with a known image magic header.
        html = html.replace(
          /<span class="json-str">"((?:iVBOR|\/9j\/|R0lGOD|UklGR)[A-Za-z0-9+\/=]{200,})"<\/span>(?!<img)/g,
          function (match, b64) {
            var mime = inferMimeType(b64) || "image/jpeg";
            return (
              '<span class="json-str">"' +
              b64.substring(0, 40) +
              '...<span class="b64-truncated">[' +
              b64.length +
              ' chars]</span>"</span>' +
              '<img class="b64-img-preview" src="data:' +
              mime +
              ";base64," +
              b64 +
              '">'
            );
          }
        );
        return html;
      }

      function redactAuth(val) {
        return /^bearer\s/i.test(val) ? "Bearer ***" : val;
      }

      function wrapBody(rawText, highlightedHtml) {
        var escaped = rawText
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
        return (
          '<div class="body-wrap"><button class="copy-btn" data-raw="' +
          escaped +
          '"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button><pre class="body">' +
          highlightedHtml +
          "</pre></div>"
        );
      }

      function titleCaseHeader(name) {
        return name.replace(/\b[a-z]/g, function (c) {
          return c.toUpperCase();
        });
      }

      function renderHeaders(headers) {
        var lines = [];
        var raw = [];
        for (var i = 0; i < headers.length; i++) {
          var h = headers[i];
          var name = titleCaseHeader(h.name);
          var val =
            h.name.toLowerCase() === "authorization"
              ? redactAuth(h.value)
              : h.value;
          lines.push(
            '<span class="json-key">' +
              name +
              '</span>: <span class="json-str">' +
              val +
              "</span>"
          );
          raw.push(name + ": " + val);
        }
        return wrapBody(raw.join("\n"), lines.join("\n"));
      }

      function tryParseJson(text) {
        try {
          return JSON.stringify(JSON.parse(text), null, 2);
        } catch (e) {
          return text;
        }
      }

      function buildTransactionText(entry) {
        var req = entry.request;
        var res = entry.response;
        var lines = [];
        lines.push("REQUEST");
        try {
          lines.push(req.method + " " + new URL(req.url).pathname);
        } catch (e) {
          lines.push(req.method + " " + req.url);
        }
        for (var i = 0; i < req.headers.length; i++) {
          var h = req.headers[i];
          var val =
            h.name.toLowerCase() === "authorization"
              ? redactAuth(h.value)
              : h.value;
          lines.push(titleCaseHeader(h.name) + ": " + val);
        }
        if (req.postData && req.postData.text) {
          lines.push("");
          lines.push(tryParseJson(req.postData.text));
        }
        lines.push("");
        lines.push("RESPONSE " + res.status + " " + res.statusText);
        for (var j = 0; j < res.headers.length; j++) {
          var rh = res.headers[j];
          lines.push(titleCaseHeader(rh.name) + ": " + rh.value);
        }
        if (res.content && res.content.text) {
          lines.push("");
          lines.push(tryParseJson(res.content.text));
        }
        return lines.join("\n");
      }

      /* === Info Extraction === */
      function extractInfo(rec) {
        var info = {
          model: null,
          endpoint: null,
          prompts: [],
          params: {},
          assets: [],
        };
        var entry = rec.entries[0];
        if (!entry) return info;

        try {
          var url = new URL(entry.request.url);
          info.endpoint = entry.request.method + " " + url.pathname;
        } catch (e) {
          info.endpoint = entry.request.method + " " + entry.request.url;
        }

        if (!entry.request.postData || !entry.request.postData.text) {
          try {
            var qurl = new URL(entry.request.url);
            qurl.searchParams.forEach(function (v, k) {
              info.params[k] = v;
            });
          } catch (e) {}
          return info;
        }

        try {
          var body = JSON.parse(entry.request.postData.text);
          info.model = body.model || null;
          if (body.messages && Array.isArray(body.messages)) {
            for (var i = 0; i < body.messages.length; i++) {
              var msg = body.messages[i];
              if (typeof msg.content === "string") {
                info.prompts.push({ role: msg.role, text: msg.content });
              } else if (Array.isArray(msg.content)) {
                var textParts = [];
                for (var j = 0; j < msg.content.length; j++) {
                  var part = msg.content[j];
                  if (part.type === "text") {
                    textParts.push(part.text);
                  } else if (part.type === "image_url" && part.image_url) {
                    info.assets.push(part.image_url.url);
                  } else if (
                    part.type === "image" &&
                    part.source &&
                    part.source.data
                  ) {
                    var mime =
                      part.source.media_type ||
                      inferMimeType(part.source.data) ||
                      "image/png";
                    info.assets.push(
                      "data:" + mime + ";base64," + part.source.data
                    );
                  }
                }
                if (textParts.length) {
                  info.prompts.push({
                    role: msg.role,
                    text: textParts.join("\n"),
                  });
                }
              }
            }
          }
          if (body.prompt && typeof body.prompt === "string") {
            info.prompts.push({ role: "prompt", text: body.prompt });
          }
          if (body.input && body.input.prompt) {
            info.prompts.push({ role: "prompt", text: body.input.prompt });
          }
          if (body.image && body.image.url) info.assets.push(body.image.url);
          if (body.reference_images && Array.isArray(body.reference_images)) {
            for (var k = 0; k < body.reference_images.length; k++) {
              if (body.reference_images[k].url)
                info.assets.push(body.reference_images[k].url);
            }
          }
          if (
            body.input &&
            body.input.image_urls &&
            Array.isArray(body.input.image_urls)
          ) {
            for (var k2 = 0; k2 < body.input.image_urls.length; k2++) {
              info.assets.push(body.input.image_urls[k2]);
            }
          }
          if (
            body.input &&
            body.input.reference_image &&
            Array.isArray(body.input.reference_image)
          ) {
            for (var ri = 0; ri < body.input.reference_image.length; ri++) {
              info.assets.push(body.input.reference_image[ri]);
            }
          }
          if (
            body.input &&
            body.input.reference_video &&
            Array.isArray(body.input.reference_video)
          ) {
            for (var rv = 0; rv < body.input.reference_video.length; rv++) {
              info.assets.push(body.input.reference_video[rv]);
            }
          }
          if (body.input && body.input.first_frame) {
            info.assets.push(body.input.first_frame);
          }
          if (body.input && body.input.reference_voice) {
            info.assets.push(body.input.reference_voice);
          }
          var skipKeys = {
            messages: 1,
            prompt: 1,
            model: 1,
            image: 1,
            input: 1,
            reference_images: 1,
          };
          for (var pk in body) {
            if (!skipKeys[pk] && body.hasOwnProperty(pk))
              info.params[pk] = body[pk];
          }
          if (body.input && typeof body.input === "object") {
            var inputSkip = {
              prompt: 1,
              image_urls: 1,
              video_urls: 1,
              input_urls: 1,
              reference_image: 1,
              reference_video: 1,
              first_frame: 1,
              reference_voice: 1,
            };
            for (var ik in body.input) {
              if (!inputSkip[ik] && body.input.hasOwnProperty(ik))
                info.params[ik] = body.input[ik];
            }
          }
        } catch (e) {}
        return info;
      }

      /* === Column Renderer === */
      function renderTransactionColumn(group, groupIdx) {
        var first = group.entries[0];
        var last = group.entries[group.entries.length - 1];
        var req = first.request;
        var label = entryLabel(first);
        var html = "";

        // Request section
        html += '<div class="pane-label">Request</div>';
        html += '<div class="entry-card">';
        html += '<div class="entry-header">';
        html += '<span class="entry-label">' + escapeHtml(label) + "</span>";
        html += "</div>";
        html +=
          '<details class="headers-details"><summary>Headers (' +
          req.headers.length +
          ")</summary>";
        html += renderHeaders(req.headers);
        html += "</details>";
        if (req.postData && req.postData.text) {
          var bodyText = tryParseJson(req.postData.text);
          html += wrapBody(
            bodyText,
            inlineMediaPreviews(syntaxHighlight(bodyText))
          );
        }
        html += "</div>";

        // Response section
        html +=
          '<div class="pane-label" style="margin-top:16px">Response</div>';

        if (group.entries.length === 1) {
          var res = first.response;
          html += '<div class="entry-card">';
          html += '<div class="entry-header">';
          html +=
            '<span class="entry-label">' +
            res.status +
            " " +
            escapeHtml(res.statusText) +
            "</span>";
          html += "</div>";
          html +=
            '<details class="headers-details"><summary>Headers (' +
            res.headers.length +
            ")</summary>";
          html += renderHeaders(res.headers);
          html += "</details>";
          if (res.content && res.content.text) {
            var resBodyText = tryParseJson(res.content.text);
            html += wrapBody(
              resBodyText,
              inlineMediaPreviews(syntaxHighlight(resBodyText))
            );
          }
          html += "</div>";
        } else {
          // Polling: show final response prominently, poll history collapsed
          var finalRes = last.response;
          html += '<div class="entry-card">';
          html += '<div class="entry-header">';
          html +=
            '<span class="entry-label">' +
            finalRes.status +
            " " +
            escapeHtml(finalRes.statusText) +
            "</span>";
          html +=
            '<span class="entry-status">' +
            group.entries.length +
            " polls</span>";
          html += "</div>";
          html +=
            '<details class="headers-details"><summary>Headers (' +
            finalRes.headers.length +
            ")</summary>";
          html += renderHeaders(finalRes.headers);
          html += "</details>";
          if (finalRes.content && finalRes.content.text) {
            var finalBodyText = tryParseJson(finalRes.content.text);
            html += wrapBody(
              finalBodyText,
              inlineMediaPreviews(syntaxHighlight(finalBodyText))
            );
          }
          html +=
            '<details class="headers-details"><summary>Poll History (' +
            (group.entries.length - 1) +
            " intermediate)</summary>";
          for (var p = 0; p < group.entries.length - 1; p++) {
            var pollRes = group.entries[p].response;
            html += '<div class="poll-entry">';
            html +=
              '<span style="color:#6c7086;font-size:11px">Poll ' +
              (p + 1) +
              ": " +
              pollRes.status +
              " " +
              escapeHtml(pollRes.statusText) +
              "</span>";
            if (pollRes.content && pollRes.content.text) {
              var pBody = tryParseJson(pollRes.content.text);
              html +=
                '<pre class="body" style="font-size:11px;max-height:100px">' +
                syntaxHighlight(pBody) +
                "</pre>";
            }
            html += "</div>";
          }
          html += "</details>";
          html += "</div>";
        }

        return html;
      }

      /* === Main Render === */
      function renderRecordingSection(rec, recIdx) {
        var dn = displayName(rec.name);
        var info = extractInfo(rec);
        var ep = recEndpoint(rec);

        var html = '<section class="recording-section" data-rec-idx="' +
          recIdx + '" data-rec-source="' + escapeHtml(rec.source || "") + '">';

        html += '<div class="recording-section-header">';
        if (rec.gitStatus)
          html += '<span class="dot ' + rec.gitStatus + '"></span>';
        html += '<span class="recording-title">' +
          escapeHtml(dn.provider + ": " + dn.test) + "</span>";
        if (info.model)
          html += '<span class="info-model">' +
            escapeHtml(info.model) + "</span>";
        if (rec.gitStatus && rec.gitStatus !== "clean")
          html += '<span class="review-badge needs-review">review</span>';
        if (ep)
          html += '<span class="endpoint">' + escapeHtml(ep) + "</span>";

        html += '<div class="section-actions">';
        if (VIEWER_CONFIG.features.gitApprove) {
          var approveDisabled = rec.gitStatus === "clean";
          html += '<button class="approve"' +
            (approveDisabled ? " disabled" : "") + ">" +
            (approveDisabled ? "Approved" : "Approve") + "</button>";
        }
        html += '<button class="copy-llm">Copy for LLM</button>';
        html += "</div>";
        html += "</div>";

        html += '<div class="recording-section-body">';
        var groups = groupTransactions(rec.entries);
        html += '<div class="txn-row">';
        for (var g = 0; g < groups.length; g++) {
          html += '<div class="txn-col">' +
            renderTransactionColumn(groups[g], g) + "</div>";
        }
        html += "</div>";
        html += "</div>";
        html += "</section>";
        return html;
      }

      function render() {
        renderGeneration++;

        var sectionsEl = document.getElementById("sections");
        var countEl = document.getElementById("rec-count");

        if (!recordings.length) {
          sectionsEl.innerHTML =
            '<div class="empty">No recordings loaded</div>';
          countEl.textContent = "";
          return;
        }

        countEl.textContent =
          recordings.length + " recording" +
          (recordings.length === 1 ? "" : "s");

        var html = "";
        for (var i = 0; i < recordings.length; i++) {
          html += renderRecordingSection(recordings[i], i);
        }
        sectionsEl.innerHTML = html;
      }

      /* === Event Listeners === */

      // Per-section action delegation: approve + copy-for-llm
      document.addEventListener("click", async function (e) {
        var section = e.target.closest(".recording-section");
        if (!section) return;
        var recIdx = parseInt(section.dataset.recIdx, 10);
        var rec = recordings[recIdx];
        if (!rec) return;

        if (e.target.classList.contains("approve")) {
          if (!VIEWER_CONFIG.features.gitApprove) return;
          e.target.textContent = "Approving...";
          try {
            var res = await fetch("/api/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ path: rec.source }),
            });
            if (res.ok) {
              rec.gitStatus = "clean";
              e.target.textContent = "Approved";
              e.target.disabled = true;
              var dot = section.querySelector(".dot");
              if (dot) dot.className = "dot clean";
              var badge = section.querySelector(".review-badge");
              if (badge) badge.remove();
            } else {
              e.target.textContent = "Failed";
            }
          } catch (err) {
            e.target.textContent = "Failed";
          }
          return;
        }

        if (e.target.classList.contains("copy-llm")) {
          var texts = [];
          var groups = groupTransactions(rec.entries);
          for (var g = 0; g < groups.length; g++) {
            var first = groups[g].entries[0];
            var last = groups[g].entries[groups[g].entries.length - 1];
            if (groups[g].entries.length === 1) {
              texts.push(buildTransactionText(first));
            } else {
              texts.push(
                buildTransactionText({
                  request: first.request,
                  response: last.response,
                })
              );
            }
          }
          if (!texts.length) return;
          var text = texts.join("\n\n---\n\n");
          var btn = e.target;
          var originalText = btn.textContent;
          navigator.clipboard.writeText(text).then(function () {
            btn.textContent = "Copied!";
            setTimeout(function () {
              btn.textContent = originalText;
            }, 1200);
          });
        }
      });

      // Copy button delegation
      document.addEventListener("click", function (e) {
        var copyBtn = e.target.closest(".copy-btn");
        if (!copyBtn) return;
        var raw = copyBtn.dataset.raw;
        navigator.clipboard.writeText(raw).then(function () {
          copyBtn.textContent = "\u2713";
          setTimeout(function () {
            copyBtn.innerHTML = "\u2398";
          }, 1200);
        });
      });

      /* === Init === */
      if (typeof HAR_DATA !== "undefined") {
        recordings = HAR_DATA.recordings || [];
        if (HAR_DATA.features) VIEWER_CONFIG.features = HAR_DATA.features;
        render();
      } else {
        fetch("/api/data")
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            recordings = data.recordings || [];
            if (data.features) VIEWER_CONFIG.features = data.features;
            render();
          });
      }
    </script>
  </body>
</html>
