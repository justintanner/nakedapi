<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NakedAPI HAR Viewer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      ::-webkit-scrollbar {
        width: 12px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
        margin: 4px 0;
      }
      ::-webkit-scrollbar-thumb {
        background: #45475a;
        border-radius: 6px;
        border: 3px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #585b70;
      }
      ::-webkit-scrollbar-corner {
        background: #11111b;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        background: #1e1e2e;
        color: #cdd6f4;
        height: 100vh;
        display: grid;
        grid-template-rows: auto auto 1fr;
        overflow: hidden;
      }

      /* Topbar */
      #topbar {
        display: flex;
        align-items: center;
        padding: 8px 16px;
        background: #181825;
        border-bottom: 1px solid #313244;
        gap: 8px;
        flex-shrink: 0;
        z-index: 100;
      }
      #topbar-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        flex-wrap: wrap;
      }
      #topbar-right {
        flex-shrink: 0;
      }
      #branding {
        font-size: 16px;
        font-weight: 700;
        color: #89b4fa;
        letter-spacing: 0.5px;
      }

      /* Custom Dropdown */
      #test-selector {
        position: relative;
      }
      #test-selector-btn {
        background: #313244;
        border: 1px solid #45475a;
        border-radius: 6px;
        color: #cdd6f4;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 280px;
        max-width: 480px;
        font-family: inherit;
      }
      #test-selector-btn:hover {
        background: #45475a;
      }
      #test-selector-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        text-align: left;
      }
      .selector-arrow {
        font-size: 10px;
        flex-shrink: 0;
      }
      #test-selector-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 4px;
        background: #181825;
        border: 1px solid #45475a;
        border-radius: 8px;
        min-width: 480px;
        max-width: 680px;
        max-height: 70vh;
        overflow-y: auto;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        z-index: 200;
      }
      #test-selector-dropdown.hidden {
        display: none;
      }
      .dd-item {
        padding: 6px 12px;
        cursor: pointer;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-left: 3px solid transparent;
        flex-wrap: wrap;
        white-space: nowrap;
      }
      .dd-endpoint {
        font-size: 11px;
        color: #6c7086;
        width: 100%;
        padding-left: 14px;
        margin-top: -2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .dd-item:hover {
        background: #313244;
      }
      .dd-item.active {
        background: #313244;
        border-left-color: #89b4fa;
      }

      /* Metadata bar */
      #rec-meta {
        padding: 6px 16px;
        background: #181825;
        border-bottom: 1px solid #313244;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      #rec-meta.hidden {
        display: none;
      }

      /* Columns */
      #columns {
        display: flex;
        overflow-x: auto;
        overflow-y: hidden;
        min-height: 0;
        gap: 1px;
        background: #313244;
      }
      .txn-col {
        flex: 1 0 600px;
        max-width: 100%;
        overflow-y: auto;
        padding: 16px;
        background: #1e1e2e;
        min-width: 0;
      }
      .txn-col:only-child {
        flex: 1 0 0;
        max-width: none;
      }

      /* Dots */
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        display: inline-block;
      }
      .dot.clean {
        background: #a6e3a1;
      }
      .dot.modified {
        background: #f9e2af;
      }
      .dot.new {
        background: #f38ba8;
      }

      /* Review badges */
      .review-badge {
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
        font-weight: 600;
        margin-left: auto;
        flex-shrink: 0;
      }
      .review-badge.needs-review {
        background: #f38ba8;
        color: #1e1e2e;
      }
      .review-badge.approved {
        background: #a6e3a1;
        color: #1e1e2e;
      }

      /* Entry cards */
      .entry-card {
        background: #181825;
        border: 1px solid #313244;
        border-radius: 8px;
        margin-bottom: 12px;
        overflow: hidden;
      }
      .entry-header {
        padding: 8px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid #313244;
        background: #11111b;
        font-size: 13px;
      }
      .entry-label {
        color: #cdd6f4;
        font-weight: 600;
      }
      .entry-status {
        margin-left: auto;
        color: #a6adc8;
        font-size: 12px;
      }
      .headers-details {
        margin: 0;
      }
      .headers-details summary {
        padding: 8px 12px;
        cursor: pointer;
        color: #6c7086;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .headers-details summary:hover {
        color: #a6adc8;
      }

      /* Pane labels */
      .pane-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #a6adc8;
        margin-bottom: 8px;
      }

      /* Body wrap and copy */
      .body-wrap {
        position: relative;
        margin: 0;
      }
      .body-wrap .copy-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        background: #313244;
        border: none;
        border-radius: 4px;
        color: #a6adc8;
        cursor: pointer;
        padding: 5px 6px;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
      }
      .body-wrap .copy-btn:hover {
        background: #45475a;
        color: #cdd6f4;
      }
      pre.body {
        background: #11111b;
        border-radius: 0;
        padding: 12px 16px;
        margin: 0;
        overflow: auto;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-all;
      }

      /* JSON highlighting */
      .json-key {
        color: #89b4fa;
      }
      .json-str {
        color: #a6e3a1;
      }
      .json-num {
        color: #fab387;
      }
      .json-bool {
        color: #cba6f7;
      }
      .json-null {
        color: #6c7086;
      }

      /* Buttons */
      #topbar button {
        padding: 6px 14px;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        font-weight: 600;
        flex-shrink: 0;
        font-family: inherit;
      }
      #approve-btn {
        background: #a6e3a1;
        color: #1e1e2e;
      }
      #approve-btn:hover {
        background: #94e2d5;
      }
      #approve-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .hidden {
        display: none !important;
      }
      #copy-llm-btn {
        background: #89b4fa;
        color: #1e1e2e;
      }
      #copy-llm-btn:hover {
        background: #74c7ec;
      }
      #copy-llm-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }
      #status-msg {
        font-size: 12px;
        color: #a6adc8;
      }

      /* Media previews */
      .b64-img-preview {
        max-width: 320px;
        max-height: 240px;
        border-radius: 6px;
        border: 1px solid #313244;
        display: block;
        margin: 4px 0;
      }
      .video-preview {
        max-width: 480px;
        max-height: 320px;
        border-radius: 6px;
        border: 1px solid #313244;
        display: block;
        margin: 4px 0;
      }
      .audio-preview {
        max-width: 320px;
        border-radius: 6px;
        display: block;
        margin: 4px 0;
      }
      .b64-truncated {
        color: #6c7086;
        font-style: italic;
      }

      /* Info model badge */
      .info-model {
        display: inline-block;
        background: #cba6f7;
        color: #1e1e2e;
        padding: 1px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }

      /* Poll entry within poll history */
      .poll-entry {
        border-top: 1px solid #313244;
        padding: 8px 12px;
      }

      /* Empty state */
      .empty {
        padding: 40px;
        text-align: center;
        color: #6c7086;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header id="topbar">
      <div id="topbar-left">
        <div id="test-selector">
          <button id="test-selector-btn">
            <span id="test-selector-label">Select a recording...</span>
            <span class="selector-arrow">&#x25BE;</span>
          </button>
          <div id="test-selector-dropdown" class="hidden"></div>
        </div>
        <button id="approve-btn" class="hidden" disabled>Approve</button>
        <button id="copy-llm-btn" disabled>Copy for LLM</button>
        <span id="status-msg"></span>
      </div>
      <div id="topbar-right">
        <span id="branding">NakedAPI</span>
      </div>
    </header>
    <div id="rec-meta" class="hidden"></div>
    <div id="columns"></div>
    <script>
      /* === Config === */
      var VIEWER_CONFIG = {
        features: { gitApprove: false },
      };

      /* === State === */
      var recordings = [];
      var selected = null;
      var renderGeneration = 0;
      var dropdownOpen = false;

      /* === HAR Parsing Utilities === */
      function displayName(recName) {
        var parts = recName.split("/");
        var provider = parts[0].replace(/_\d+$/, "");
        var test = parts.length > 1 ? parts[1].replace(/_\d+$/, "") : parts[0];
        return { provider: provider, test: test };
      }

      function recEndpoint(rec) {
        var entry = rec.entries && rec.entries[0];
        if (!entry) return "";
        try {
          var u = new URL(entry.request.url);
          return entry.request.method + " " + u.host + u.pathname;
        } catch (e) {
          return entry.request.method + " " + entry.request.url;
        }
      }

      function entryLabel(entry) {
        try {
          var u = new URL(entry.request.url);
          var segments = u.pathname.split("/").filter(Boolean);
          var last = segments[segments.length - 1] || u.pathname;
          return entry.request.method + " /" + last;
        } catch (e) {
          return entry.request.method;
        }
      }

      function groupTransactions(entries) {
        var groups = [];
        for (var i = 0; i < entries.length; i++) {
          var entry = entries[i];
          var key;
          try {
            var u = new URL(entry.request.url);
            key = entry.request.method + " " + u.pathname;
          } catch (e) {
            key = entry.request.method + " " + entry.request.url;
          }
          if (groups.length > 0 && groups[groups.length - 1].key === key) {
            groups[groups.length - 1].entries.push(entry);
          } else {
            groups.push({ key: key, entries: [entry] });
          }
        }
        return groups;
      }

      /* === Rendering Utilities === */
      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function inferMimeType(b64) {
        if (b64.startsWith("/9j/")) return "image/jpeg";
        if (b64.startsWith("iVBOR")) return "image/png";
        if (b64.startsWith("R0lGOD")) return "image/gif";
        if (b64.startsWith("UklGR")) return "image/webp";
        return null;
      }

      function syntaxHighlight(json) {
        if (typeof json !== "string") json = JSON.stringify(json, null, 2);
        return json
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"([^"]+)"\s*:/g, '<span class="json-key">"$1"</span>:')
          .replace(/: "([^"]*)"/g, ': <span class="json-str">"$1"</span>')
          .replace(/: (\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
          .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
          .replace(/: (null)/g, ': <span class="json-null">$1</span>');
      }

      function inlineMediaPreviews(html) {
        html = html.replace(
          /(<span class="json-key">"b64_json"<\/span>:\s*<span class="json-str">")(([A-Za-z0-9+\/=]{40})([A-Za-z0-9+\/=]*))"<\/span>/g,
          function (match, prefix, fullB64, first40) {
            var mime = inferMimeType(fullB64) || "image/jpeg";
            return (
              prefix +
              first40 +
              '...<span class="b64-truncated">[' +
              fullB64.length +
              ' chars]</span>"</span>' +
              '<img class="b64-img-preview" src="data:' +
              mime +
              ";base64," +
              fullB64 +
              '">'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"data"<\/span>:\s*<span class="json-str">")(([A-Za-z0-9+\/=]{100,}))"<\/span>/g,
          function (match, prefix, fullB64) {
            var mime = inferMimeType(fullB64);
            if (!mime) return match;
            return (
              prefix +
              fullB64.substring(0, 40) +
              '...<span class="b64-truncated">[' +
              fullB64.length +
              ' chars]</span>"</span>' +
              '<img class="b64-img-preview" src="data:' +
              mime +
              ";base64," +
              fullB64 +
              '">'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"url"<\/span>:\s*<span class="json-str">")(data:image\/[a-z+]+;base64,([A-Za-z0-9+\/=]{40})([A-Za-z0-9+\/=]*))"<\/span>/g,
          function (match, prefix, fullUri) {
            return (
              prefix +
              fullUri.substring(0, 40) +
              '...<span class="b64-truncated">[' +
              fullUri.length +
              ' chars]</span>"</span>' +
              '<img class="b64-img-preview" src="' +
              fullUri +
              '">'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"url"<\/span>:\s*<span class="json-str">")(https?:\/\/[^"]*\.(?:jpe?g|png|gif|webp|svg)(?:[^"]*)?)"<\/span>/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><img class="b64-img-preview" src="' +
              fullUrl +
              '">'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"url"<\/span>:\s*<span class="json-str">")(https?:\/\/[^"]*\.(?:mp4|webm|mov|ogg)(?:[^"]*)?)"<\/span>/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><video class="video-preview" controls src="' +
              fullUrl +
              '"></video>'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"video_url"<\/span>:\s*<span class="json-str">")(https?:\/\/[^"]*)"<\/span>/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><video class="video-preview" controls src="' +
              fullUrl +
              '"></video>'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"url"<\/span>:\s*<span class="json-str">")(https?:\/\/[^"]*\.(?:mp3|wav|flac|aac)(?:[^"]*)?)"<\/span>/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><audio class="audio-preview" controls src="' +
              fullUrl +
              '"></audio>'
            );
          }
        );
        html = html.replace(
          /(<span class="json-str">")(https?:\/\/[^"]*\.(?:jpe?g|png|gif|webp|svg)(?:\?[^"]*)?)"<\/span>(?!<img)/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><img class="b64-img-preview" src="' +
              fullUrl +
              '">'
            );
          }
        );
        html = html.replace(
          /(<span class="json-str">")(https?:\/\/[^"]*\.(?:mp4|webm|mov)(?:\?[^"]*)?)"<\/span>(?!<video)/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><video class="video-preview" controls src="' +
              fullUrl +
              '"></video>'
            );
          }
        );
        html = html.replace(
          /(<span class="json-str">")(https?:\/\/[^"]*\.(?:mp3|wav|flac|aac)(?:\?[^"]*)?)"<\/span>(?!<audio)/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><audio class="audio-preview" controls src="' +
              fullUrl +
              '"></audio>'
            );
          }
        );
        html = html.replace(
          /(<span class="json-key">"url"<\/span>:\s*<span class="json-str">")(https?:\/\/[^"]+)"<\/span>(?!<img|<video|<audio)/gi,
          function (match, prefix, fullUrl) {
            return (
              prefix +
              fullUrl +
              '"</span><img class="b64-img-preview" src="' +
              fullUrl +
              '" onerror="this.style.display=&apos;none&apos;">'
            );
          }
        );
        // KIE resultJson: nested JSON string containing output URLs
        html = html.replace(
          /(<span class="json-key">"resultJson"<\/span>:\s*<span class="json-str">")((?:\\.|[^"])*)"<\/span>/g,
          function (match, prefix, escapedJson) {
            try {
              var jsonStr = JSON.parse('"' + escapedJson + '"');
              var parsed = JSON.parse(jsonStr);
              var urls = [];
              if (Array.isArray(parsed.resultUrls)) {
                urls = parsed.resultUrls;
              } else if (Array.isArray(parsed.works)) {
                for (var w = 0; w < parsed.works.length; w++) {
                  if (parsed.works[w].resource)
                    urls.push(parsed.works[w].resource);
                  if (parsed.works[w].cover) urls.push(parsed.works[w].cover);
                }
              }
              var previews = "";
              for (var u = 0; u < urls.length; u++) {
                var url = urls[u];
                if (/\.mp4|\.webm|\.mov|video/i.test(url)) {
                  previews +=
                    '<video class="video-preview" controls src="' +
                    url +
                    '"></video>';
                } else if (/\.mp3|\.wav|\.flac|\.aac|audio/i.test(url)) {
                  previews +=
                    '<audio class="audio-preview" controls src="' +
                    url +
                    '"></audio>';
                } else {
                  previews +=
                    '<img class="b64-img-preview" src="' +
                    url +
                    '" onerror="this.style.display=&apos;none&apos;">';
                }
              }
              return prefix + escapedJson + '"</span>' + previews;
            } catch (e) {
              return match;
            }
          }
        );
        return html;
      }

      function redactAuth(val) {
        return /^bearer\s/i.test(val) ? "Bearer ***" : val;
      }

      function wrapBody(rawText, highlightedHtml) {
        var escaped = rawText
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
        return (
          '<div class="body-wrap"><button class="copy-btn" data-raw="' +
          escaped +
          '"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button><pre class="body">' +
          highlightedHtml +
          "</pre></div>"
        );
      }

      function titleCaseHeader(name) {
        return name.replace(/\b[a-z]/g, function (c) {
          return c.toUpperCase();
        });
      }

      function renderHeaders(headers) {
        var lines = [];
        var raw = [];
        for (var i = 0; i < headers.length; i++) {
          var h = headers[i];
          var name = titleCaseHeader(h.name);
          var val =
            h.name.toLowerCase() === "authorization"
              ? redactAuth(h.value)
              : h.value;
          lines.push(
            '<span class="json-key">' +
              name +
              '</span>: <span class="json-str">' +
              val +
              "</span>"
          );
          raw.push(name + ": " + val);
        }
        return wrapBody(raw.join("\n"), lines.join("\n"));
      }

      function tryParseJson(text) {
        try {
          return JSON.stringify(JSON.parse(text), null, 2);
        } catch (e) {
          return text;
        }
      }

      function buildTransactionText(entry) {
        var req = entry.request;
        var res = entry.response;
        var lines = [];
        lines.push("REQUEST");
        try {
          lines.push(req.method + " " + new URL(req.url).pathname);
        } catch (e) {
          lines.push(req.method + " " + req.url);
        }
        for (var i = 0; i < req.headers.length; i++) {
          var h = req.headers[i];
          var val =
            h.name.toLowerCase() === "authorization"
              ? redactAuth(h.value)
              : h.value;
          lines.push(titleCaseHeader(h.name) + ": " + val);
        }
        if (req.postData && req.postData.text) {
          lines.push("");
          lines.push(tryParseJson(req.postData.text));
        }
        lines.push("");
        lines.push("RESPONSE " + res.status + " " + res.statusText);
        for (var j = 0; j < res.headers.length; j++) {
          var rh = res.headers[j];
          lines.push(titleCaseHeader(rh.name) + ": " + rh.value);
        }
        if (res.content && res.content.text) {
          lines.push("");
          lines.push(tryParseJson(res.content.text));
        }
        return lines.join("\n");
      }

      /* === Info Extraction === */
      function extractInfo(rec) {
        var info = {
          model: null,
          endpoint: null,
          prompts: [],
          params: {},
          assets: [],
        };
        var entry = rec.entries[0];
        if (!entry) return info;

        try {
          var url = new URL(entry.request.url);
          info.endpoint = entry.request.method + " " + url.pathname;
        } catch (e) {
          info.endpoint = entry.request.method + " " + entry.request.url;
        }

        if (!entry.request.postData || !entry.request.postData.text) {
          try {
            var qurl = new URL(entry.request.url);
            qurl.searchParams.forEach(function (v, k) {
              info.params[k] = v;
            });
          } catch (e) {}
          return info;
        }

        try {
          var body = JSON.parse(entry.request.postData.text);
          info.model = body.model || null;
          if (body.messages && Array.isArray(body.messages)) {
            for (var i = 0; i < body.messages.length; i++) {
              var msg = body.messages[i];
              if (typeof msg.content === "string") {
                info.prompts.push({ role: msg.role, text: msg.content });
              } else if (Array.isArray(msg.content)) {
                var textParts = [];
                for (var j = 0; j < msg.content.length; j++) {
                  var part = msg.content[j];
                  if (part.type === "text") {
                    textParts.push(part.text);
                  } else if (part.type === "image_url" && part.image_url) {
                    info.assets.push(part.image_url.url);
                  } else if (
                    part.type === "image" &&
                    part.source &&
                    part.source.data
                  ) {
                    var mime =
                      part.source.media_type ||
                      inferMimeType(part.source.data) ||
                      "image/png";
                    info.assets.push(
                      "data:" + mime + ";base64," + part.source.data
                    );
                  }
                }
                if (textParts.length) {
                  info.prompts.push({
                    role: msg.role,
                    text: textParts.join("\n"),
                  });
                }
              }
            }
          }
          if (body.prompt && typeof body.prompt === "string") {
            info.prompts.push({ role: "prompt", text: body.prompt });
          }
          if (body.input && body.input.prompt) {
            info.prompts.push({ role: "prompt", text: body.input.prompt });
          }
          if (body.image && body.image.url) info.assets.push(body.image.url);
          if (body.reference_images && Array.isArray(body.reference_images)) {
            for (var k = 0; k < body.reference_images.length; k++) {
              if (body.reference_images[k].url)
                info.assets.push(body.reference_images[k].url);
            }
          }
          if (
            body.input &&
            body.input.image_urls &&
            Array.isArray(body.input.image_urls)
          ) {
            for (var k2 = 0; k2 < body.input.image_urls.length; k2++) {
              info.assets.push(body.input.image_urls[k2]);
            }
          }
          var skipKeys = {
            messages: 1,
            prompt: 1,
            model: 1,
            image: 1,
            input: 1,
            reference_images: 1,
          };
          for (var pk in body) {
            if (!skipKeys[pk] && body.hasOwnProperty(pk))
              info.params[pk] = body[pk];
          }
          if (body.input && typeof body.input === "object") {
            var inputSkip = {
              prompt: 1,
              image_urls: 1,
              video_urls: 1,
              input_urls: 1,
            };
            for (var ik in body.input) {
              if (!inputSkip[ik] && body.input.hasOwnProperty(ik))
                info.params[ik] = body.input[ik];
            }
          }
        } catch (e) {}
        return info;
      }

      /* === Column Renderer === */
      function renderTransactionColumn(group, groupIdx) {
        var first = group.entries[0];
        var last = group.entries[group.entries.length - 1];
        var req = first.request;
        var label = entryLabel(first);
        var html = "";

        // Request section
        html += '<div class="pane-label">Request</div>';
        html += '<div class="entry-card">';
        html += '<div class="entry-header">';
        html += '<span class="entry-label">' + escapeHtml(label) + "</span>";
        html += "</div>";
        html +=
          '<details class="headers-details"><summary>Headers (' +
          req.headers.length +
          ")</summary>";
        html += renderHeaders(req.headers);
        html += "</details>";
        if (req.postData && req.postData.text) {
          var bodyText = tryParseJson(req.postData.text);
          html += wrapBody(
            bodyText,
            inlineMediaPreviews(syntaxHighlight(bodyText))
          );
        }
        html += "</div>";

        // Response section
        html +=
          '<div class="pane-label" style="margin-top:16px">Response</div>';

        if (group.entries.length === 1) {
          var res = first.response;
          html += '<div class="entry-card">';
          html += '<div class="entry-header">';
          html +=
            '<span class="entry-label">' +
            res.status +
            " " +
            escapeHtml(res.statusText) +
            "</span>";
          html += "</div>";
          html +=
            '<details class="headers-details"><summary>Headers (' +
            res.headers.length +
            ")</summary>";
          html += renderHeaders(res.headers);
          html += "</details>";
          if (res.content && res.content.text) {
            var resBodyText = tryParseJson(res.content.text);
            html += wrapBody(
              resBodyText,
              inlineMediaPreviews(syntaxHighlight(resBodyText))
            );
          }
          html += "</div>";
        } else {
          // Polling: show final response prominently, poll history collapsed
          var finalRes = last.response;
          html += '<div class="entry-card">';
          html += '<div class="entry-header">';
          html +=
            '<span class="entry-label">' +
            finalRes.status +
            " " +
            escapeHtml(finalRes.statusText) +
            "</span>";
          html +=
            '<span class="entry-status">' +
            group.entries.length +
            " polls</span>";
          html += "</div>";
          html +=
            '<details class="headers-details"><summary>Headers (' +
            finalRes.headers.length +
            ")</summary>";
          html += renderHeaders(finalRes.headers);
          html += "</details>";
          if (finalRes.content && finalRes.content.text) {
            var finalBodyText = tryParseJson(finalRes.content.text);
            html += wrapBody(
              finalBodyText,
              inlineMediaPreviews(syntaxHighlight(finalBodyText))
            );
          }
          html +=
            '<details class="headers-details"><summary>Poll History (' +
            (group.entries.length - 1) +
            " intermediate)</summary>";
          for (var p = 0; p < group.entries.length - 1; p++) {
            var pollRes = group.entries[p].response;
            html += '<div class="poll-entry">';
            html +=
              '<span style="color:#6c7086;font-size:11px">Poll ' +
              (p + 1) +
              ": " +
              pollRes.status +
              " " +
              escapeHtml(pollRes.statusText) +
              "</span>";
            if (pollRes.content && pollRes.content.text) {
              var pBody = tryParseJson(pollRes.content.text);
              html +=
                '<pre class="body" style="font-size:11px;max-height:100px">' +
                syntaxHighlight(pBody) +
                "</pre>";
            }
            html += "</div>";
          }
          html += "</details>";
          html += "</div>";
        }

        return html;
      }

      function renderRecMeta(rec) {
        var meta = document.getElementById("rec-meta");
        var info = extractInfo(rec);
        var dn = displayName(rec.name);
        var html = "";
        if (rec.gitStatus)
          html += '<span class="dot ' + rec.gitStatus + '"></span>';
        html +=
          '<span style="font-weight:600">' +
          escapeHtml(dn.provider + ": " + dn.test) +
          "</span>";
        if (info.model)
          html +=
            '<span class="info-model">' + escapeHtml(info.model) + "</span>";
        if (info.endpoint)
          html +=
            '<span style="color:#6c7086;font-size:11px">' +
            escapeHtml(info.endpoint) +
            "</span>";
        if (rec.gitStatus && rec.gitStatus !== "clean")
          html += '<span class="review-badge needs-review">review</span>';
        meta.innerHTML = html;
        meta.classList.remove("hidden");
      }

      /* === Dropdown === */
      function getSelectionLabel() {
        if (selected !== null && recordings[selected]) {
          var dn = displayName(recordings[selected].name);
          var ep = recEndpoint(recordings[selected]);
          return dn.provider + ": " + dn.test + (ep ? " \u2014 " + ep : "");
        }
        return "Select a recording...";
      }

      function populateDropdown() {
        document.getElementById("test-selector-label").textContent =
          getSelectionLabel();
        var dd = document.getElementById("test-selector-dropdown");
        var html = "";

        for (var i = 0; i < recordings.length; i++) {
          var dn = displayName(recordings[i].name);
          var recActive = selected === i;
          var ep = recEndpoint(recordings[i]);
          var title = dn.provider + ": " + dn.test;
          html +=
            '<div class="dd-item' +
            (recActive ? " active" : "") +
            '" data-idx="' +
            i +
            '">';
          if (recordings[i].gitStatus)
            html += '<span class="dot ' + recordings[i].gitStatus + '"></span>';
          html += escapeHtml(title);
          if (recordings[i].gitStatus && recordings[i].gitStatus !== "clean")
            html += '<span class="review-badge needs-review">review</span>';
          if (ep)
            html += '<div class="dd-endpoint">' + escapeHtml(ep) + "</div>";
          html += "</div>";
        }

        dd.innerHTML = html;

        dd.querySelectorAll(".dd-item").forEach(function (el) {
          el.addEventListener("click", function (e) {
            e.stopPropagation();
            selected = parseInt(el.dataset.idx);
            dropdownOpen = false;
            dd.classList.add("hidden");
            render();
          });
        });
      }

      /* === Main Render === */
      function render() {
        renderGeneration++;

        populateDropdown();

        var columnsEl = document.getElementById("columns");
        var metaEl = document.getElementById("rec-meta");
        var approveBtn = document.getElementById("approve-btn");
        var copyLlmBtn = document.getElementById("copy-llm-btn");
        var statusMsg = document.getElementById("status-msg");

        // Reset
        if (VIEWER_CONFIG.features.gitApprove) {
          approveBtn.classList.remove("hidden");
        }
        approveBtn.disabled = true;
        approveBtn.textContent = "Approve";
        copyLlmBtn.disabled = true;
        statusMsg.textContent = "";
        statusMsg.style.color = "#a6adc8";
        metaEl.classList.add("hidden");

        if (selected !== null && recordings[selected]) {
          var rec = recordings[selected];
          renderRecMeta(rec);

          var groups = groupTransactions(rec.entries);
          var recHtml = "";
          for (var g = 0; g < groups.length; g++) {
            recHtml +=
              '<div class="txn-col">' +
              renderTransactionColumn(groups[g], g) +
              "</div>";
          }
          columnsEl.innerHTML = recHtml;

          copyLlmBtn.disabled = false;

          if (VIEWER_CONFIG.features.gitApprove) {
            approveBtn.disabled = rec.gitStatus === "clean";
            if (rec.gitStatus === "clean") {
              statusMsg.textContent = "Approved";
              statusMsg.style.color = "#a6e3a1";
            } else {
              statusMsg.textContent =
                "Pending review \u2014 approve to stage for commit";
              statusMsg.style.color = "#f38ba8";
            }
          }
        } else {
          columnsEl.innerHTML =
            '<div class="txn-col"><div class="empty">Select a recording</div></div>';
        }
      }

      /* === Event Listeners === */

      // Dropdown toggle
      document
        .getElementById("test-selector-btn")
        .addEventListener("click", function (e) {
          e.stopPropagation();
          var dd = document.getElementById("test-selector-dropdown");
          dropdownOpen = !dropdownOpen;
          if (dropdownOpen) {
            dd.classList.remove("hidden");
          } else {
            dd.classList.add("hidden");
          }
        });
      document.addEventListener("click", function () {
        if (dropdownOpen) {
          dropdownOpen = false;
          document
            .getElementById("test-selector-dropdown")
            .classList.add("hidden");
        }
      });

      // Approve
      document
        .getElementById("approve-btn")
        .addEventListener("click", async function () {
          if (selected === null || !VIEWER_CONFIG.features.gitApprove) return;
          var rec = recordings[selected];
          document.getElementById("status-msg").textContent = "Approving...";
          var res = await fetch("/api/approve", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: rec.source }),
          });
          if (res.ok) {
            rec.gitStatus = "clean";
            document.getElementById("status-msg").textContent = "Approved";
            document.getElementById("status-msg").style.color = "#a6e3a1";
            document.getElementById("approve-btn").disabled = true;
            render();
          } else {
            document.getElementById("status-msg").textContent =
              "Failed to approve";
          }
        });

      // Copy for LLM
      document
        .getElementById("copy-llm-btn")
        .addEventListener("click", function () {
          var texts = [];
          if (selected !== null && recordings[selected]) {
            var rec = recordings[selected];
            var groups = groupTransactions(rec.entries);
            for (var g = 0; g < groups.length; g++) {
              var first = groups[g].entries[0];
              var last = groups[g].entries[groups[g].entries.length - 1];
              if (groups[g].entries.length === 1) {
                texts.push(buildTransactionText(first));
              } else {
                texts.push(
                  buildTransactionText({
                    request: first.request,
                    response: last.response,
                  })
                );
              }
            }
          }
          if (!texts.length) return;
          var text = texts.join("\n\n---\n\n");
          var btn = document.getElementById("copy-llm-btn");
          navigator.clipboard.writeText(text).then(function () {
            btn.textContent = "Copied!";
            setTimeout(function () {
              btn.textContent = "Copy for LLM";
            }, 1200);
          });
        });

      // Copy button delegation
      document.addEventListener("click", function (e) {
        var copyBtn = e.target.closest(".copy-btn");
        if (!copyBtn) return;
        var raw = copyBtn.dataset.raw;
        navigator.clipboard.writeText(raw).then(function () {
          copyBtn.textContent = "\u2713";
          setTimeout(function () {
            copyBtn.innerHTML = "\u2398";
          }, 1200);
        });
      });

      /* === Init === */
      if (typeof HAR_DATA !== "undefined") {
        recordings = HAR_DATA.recordings || [];
        if (HAR_DATA.features) VIEWER_CONFIG.features = HAR_DATA.features;
        if (recordings.length) selected = 0;
        render();
      } else {
        fetch("/api/data")
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            recordings = data.recordings || [];
            if (data.features) VIEWER_CONFIG.features = data.features;
            if (recordings.length) selected = 0;
            render();
          });
      }
    </script>
  </body>
</html>
