name: screenshot-harness
description: Render a harness-report HTML file to a full-page PNG via headless Chromium.

inputs:
  html-source:
    description: Path to the generated harness-report HTML file.
    required: true
  output:
    description: Path where the PNG screenshot should be written.
    required: true
  width:
    description: Viewport width in pixels.
    required: false
    default: "1920"

runs:
  using: composite
  steps:
    - name: Install Playwright Chromium
      shell: bash
      run: npx playwright install --with-deps chromium

    - name: Capture screenshot
      shell: bash
      run: npx tsx tests/harness-screenshot.ts "${{ inputs.html-source }}" "${{ inputs.output }}" --width "${{ inputs.width }}"
