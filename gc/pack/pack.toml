# Apicity — Gas City pack.
#
# One agent picks up beads (EPICs) and does the work, using CLAUDE.md as
# its guide. No formulas, no orders, no worktree isolation.

[pack]
name = "apicity"
schema = 1

[[agent]]
name = "worker"
scope = "rig"
wake_mode = "resume"
prompt_template = "prompts/worker.md"
nudge = "Check for open beads. Pick one up and do the work, using CLAUDE.md as your guide."
pre_start = [
    "{{.ConfigDir}}/scripts/op-check.sh {{.RigRoot}}",
]
session_setup = [
    "pnpm install --frozen-lockfile",
]
idle_timeout = "2h"

    [agent.pool]
    min = 0
    max = 1
